services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aleph-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: saas_platform
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: saas_secret_2024
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U saas_user -d saas_platform']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: aleph-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: aleph-frontend
    restart: unless-stopped
    ports:
      - '5174:5173'
    depends_on:
      - backend

volumes:
  pgdata:
